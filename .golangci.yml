version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - afterglow-judge-engine

linters:
  enable:
    # 基础正确性检查
    - errcheck         # 检查未处理的错误
    - errorlint        # 错误包装检查（Go 1.13+）
    - govet            # Go 官方静态分析
    - ineffassign      # 检测无效赋值
    - misspell         # 拼写检查
    - nilerr           # 检查返回 nil 错误的问题
    - revive           # golint 替代品
    - staticcheck      # 静态分析套件
    - unconvert        # 移除不必要的类型转换
    - unparam          # 检测未使用的函数参数
    - unused           # 检测未使用的常量、变量、函数
    - usestdlibvars    # 检测可用标准库常量的地方

    # 代码复杂度检查
    - gocognit         # 认知复杂度检查
    - funlen           # 函数长度检查

    # 错误处理
    - errname          # 错误命名规范（Err 前缀、Error 后缀）
    - nilnil           # 检查同时返回 nil error 和 nil value

    # 现代化检查
    - mirror           # 检测 bytes/strings 的错误使用模式
    - modernize        # 建议使用现代语言特性
    - exptostd         # 检测可用标准库替代 x/exp 的地方

    # 性能检查
    - perfsprint       # 检测可优化的 fmt.Sprintf
    - prealloc         # 检测可预分配的切片
    - makezero         # 检测非零初始长度的切片声明

    # 安全检查
    - gosec            # 安全问题检查
    - bidichk          # 检测危险的 Unicode 字符序列

    # 代码风格
    - godot            # 检查注释是否以句号结尾
    - goconst          # 检测可提取为常量的重复字符串
    - gocritic         # 全面的代码诊断
    - predeclared      # 检测遮蔽预声明标识符
    - reassign         # 检查包变量重新赋值
    - sloglint         # log/slog 使用规范检查

    # 接口和类型
    - iface            # 检测接口使用不当
    - interfacebloat   # 检查接口方法数量

    # 测试相关
    - testifylint      # testify 使用规范检查

    # 注释和文档
    - godox            # 检测 FIXME、TODO 等关键词

  settings:
    # 认知复杂度限制
    gocognit:
      min-complexity: 20

    # 函数长度限制
    funlen:
      lines: 120        # 允许编排函数保持直线叙事，不为数字强拆
      statements: 60    # 测试文件另有更宽松的排除规则
      ignore-comments: true

    # gosec 安全检查配置
    gosec:
      excludes:
        - G104 # 允许在某些情况下忽略错误（如 defer）
        - G404 # 允许使用 math/rand/v2（非加密场景）
        - G304 # 路径已经在 resource/workspace 边界集中校验
      config:
        G301: "0644" # 允许的文件权限
        G302: "0755" # 允许的目录权限
        G304: "0644" # 允许文件包含（已验证路径）
        G306: "0644" # 允许的写入权限

    # gocritic 配置
    # revive 配置
    revive:
      rules:
        # 基础规则
        - name: blank-imports
        - name: context-as-argument
        - name: increment-decrement
        - name: unexported-return

        - name: constant-logical-expr
        - name: deep-exit
        - name: defer
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: import-shadowing
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: superfluous-else
        - name: time-equal
        - name: unexported-naming
        - name: unnecessary-stmt
        - name: unused-receiver

    # sloglint 配置（log/slog 规范）
    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      no-global: ""
      context: ""

    # 性能优化配置
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

    # 预分配检查
    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    # 常量提取
    goconst:
      min-len: 3
      min-occurrences: 3
      ignore-tests: true

    # 接口检查
    interfacebloat:
      max: 10

  exclusions:
    rules:
      # 测试文件放宽限制：测试数据和表格用例不应被重构成一堆常量。
      - path: _test\.go
        linters:
          - errcheck
          - funlen
          - gocognit
          - gosec
          - goconst
          - revive

      # 排除特定消息。
      - linters: [revive]
        text: "exported:|package-comments:"

      # 允许 float 比较（测试中）。
      - linters: [testifylint]
        text: "float-compare"
        path: _test\.go

      # main 函数可以更长。
      - path: cmd/
        linters:
          - funlen
          - gocognit

      # 允许在 defer 中忽略错误。
      - source: "defer.*\\.(Close|Unlock)\\(\\)"
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
